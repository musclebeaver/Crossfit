events {
    worker_connections 1024;
}

http {
    upstream backend {
        server app:8080;
    }

    server {
        listen 80;
        server_name crossfit.beaverdeveloper.site;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSL 설정을 위한 인증서 경로 예시 (실제 운영 시 주석 해제)
        # listen 443 ssl;
        # ssl_certificate /etc/letsencrypt/live/crossfit.beaverdeveloper.site/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/crossfit.beaverdeveloper.site/privkey.pem;
    }
}
